<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DvorakMaster</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>DvorakMaster</h1>
            <p>Master the Dvorak layout with classic stories</p>
        </header>

        <main id="game-container">
            <div id="loading" class="hidden">
                <div class="spinner"></div>
            </div>

            <div id="stats-bar">
                <div class="stat-card">
                    <div class="stat-label">WPM</div>
                    <div class="stat-value" id="wpm">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Accuracy</div>
                    <div class="stat-value" id="accuracy">100%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Streak</div>
                    <div class="stat-value" id="streak">0</div>
                </div>
            </div>

            <div id="typing-area" tabindex="0">
                <div id="text-display"></div>
                <input type="text" id="hidden-input" autocomplete="off" spellcheck="false">
            </div>

            <div id="keyboard-container">
                <!-- Generated by JS -->
            </div>
        </main>

        <div id="modal-overlay" class="hidden">
            <div class="modal">
                <h2>Session Complete!</h2>
                <div class="modal-stats">
                    <div class="modal-stat">
                        <div class="label">Final WPM</div>
                        <div class="value" id="final-wpm">0</div>
                    </div>
                    <div class="modal-stat">
                        <div class="label">Accuracy</div>
                        <div class="value" id="final-accuracy">0%</div>
                    </div>
                </div>
                <button id="restart-btn">Play Again</button>
            </div>
        </div>

        <footer>
            <p>Tip: Focus on accuracy first, speed will follow.</p>
        </footer>
    </div>

    <script src="/static/js/dvorak.js"></script>
    <script src="/static/js/game.js"></script>
</body>

</html>
